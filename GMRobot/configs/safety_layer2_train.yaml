# Layer 2 offline training config — Phase 2+ GT labels + STOP oversampling.
#
# label_source options:
#   g_rule          — Layer 1 rule output (inherits rule bias)
#   gt_ground_truth — simulation distance-based collision GT (g_ground_truth column) [PRIMARY]
#   collision       — alias for gt_ground_truth
#   hybrid          — dist < collision_threshold → STOP; warn-zone g_rule STOP → pseudo STOP
#
# When label_source=gt_ground_truth, labels.hybrid block is ignored (kept for quick switch).
# STOP imbalance: oversample_stop_ratio × duplicate + class_weight=balanced (RF).
#
# Data filter: min_run_id excludes pre-Phase-2.5b logs without envelope columns.
# Phase 2.5c: use 20260619+ runs collected under envelope gating (GT v1.2).
# split.seed=8: intrusion/GT STOP episodes land in train set (verified 2026-06-17).
data:
  log_dir: /root/GMRobot/output/safety_logs
  min_run_id: "20260619_000000"
  glob_pattern: "**/episode_*.csv"

labels:
  label_source: gt_ground_truth
  hybrid:
    collision_threshold: 0.13
    safe_dist_hard_stop: 0.13
    safe_dist_warn: 0.16
  oversample_stop: true
  oversample_stop_ratio: 3.0

features:
  include_derived: false
  eps: 1.0e-6
  inf_ttc_replacement: 999.0

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 8

model:
  type: random_forest
  random_forest:
    n_estimators: 200
    max_depth: null
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1
    class_weight: balanced
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    random_state: 42
    n_jobs: -1

output:
  dir: /root/GMRobot/output/safety_models
  run_name: auto
