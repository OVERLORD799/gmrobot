name: Build and Push Docker Image

# Requires a self-hosted runner with:
#   - NVIDIA GPU + driver >= 535
#   - Docker + nvidia-container-toolkit
#   - >= 80 GB free disk space
#   - NVCR credentials (nvcr.io — Isaac Sim)
#   - GitHub Container Registry (ghcr.io) push access
#
# Labels for self-hosted runner matching:
#   self-hosted, linux, x64, gpu

on:
  push:
    branches: [master]
    paths:
      - 'docker/**'
      - 'scripts/**'
      - 'config/**'
      - 'vendored/**'
      - '**.py'
  workflow_dispatch:  # manual trigger
    inputs:
      tag:
        description: 'Image tag override (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, gpu]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to nvcr.io (Isaac Sim base)
        uses: docker/login-action@v3
        with:
          registry: nvcr.io
          username: ${{ secrets.NVCR_USERNAME }}
          password: ${{ secrets.NVCR_PASSWORD }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${REGISTRY}/${IMAGE_NAME}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          bash docker/build.sh --tag "${{ steps.tag.outputs.full }}" --no-assets-copy

      - name: Push to ghcr.io
        run: |
          docker push "${{ steps.tag.outputs.full }}"

      - name: Summary
        run: |
          echo "Image pushed: ${{ steps.tag.outputs.full }}"
          echo "Pull: docker pull ${{ steps.tag.outputs.full }}"
