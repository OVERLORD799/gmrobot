  height_mode: table
  retreat_steps: 200
episode:
  max_steps: 3000
  num_parts: 1
disturbance:
  workspace_x:
  - 0.0
  - 0.15
  workspace_y:
  - -0.5
  - 0.5
  cautious_threshold: 0.15
  moderate_threshold: 0.55
  g1_spawn_x: -1.45
  g1_spawn_y: 0.0
  g1_spawn_yaw: 0.0
  g1_spawn_jitter_xy: 0.0
batch:
  max_steps: 3000
  output_csv: ''
seed: 44
repeat: 1
