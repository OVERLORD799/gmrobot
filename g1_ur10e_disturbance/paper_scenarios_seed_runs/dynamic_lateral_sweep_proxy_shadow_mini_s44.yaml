mode: constrained_wander
scenario: constrained_wander
per_part_protocol: true
dynamic_sweep:
  enabled: true
  start_xyz:
  - -0.3
  - -0.65
  - 0.45
  end_xyz:
  - 0.62
  - 0.32
  - 0.45
  duration_steps: 60
  retreat_duration_steps: 50
