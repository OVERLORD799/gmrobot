# B1 8-part stability gate (not a final paper cell).
# Same geometry / replan wiring as static_occupancy_proxy.yaml, truncated to
# 8 parts so attempt 5–7 corridor events appear without a full 20-part run.

name: "static_occupancy_proxy_8part"
description: "B1 8-part seed stability gate — check TRANSIT SLOW streak / replan repeatability"
mode: "constrained_wander"
scenario: "constrained_wander"

per_part_protocol: true

safety:
  config_path: "configs/safety_fusion.yaml"
  enable_envelope: true
  enable_replan: true
  replan:
    held_critical_replan_enabled: true

virtual_hand:
  reach_radius: 0.55
  transit_proxy_radius: 0.40
  pick_place_proxy_radius: 0.08
  reset_proxy_radius: 0.30
  speed: 0.12
  height_mode: "table"
  retreat_steps: 200

episode:
  max_steps: 8000
  num_parts: 8

disturbance:
  workspace_x: [0.00, 0.15]
  workspace_y: [-0.5, 0.5]
  cautious_threshold: 0.15
  moderate_threshold: 0.55
  g1_spawn_x: -1.45
  g1_spawn_y: 0.0
  g1_spawn_yaw: 0.0
  g1_spawn_jitter_xy: 0.0

batch:
  max_steps: 8000
  output_csv: ""

seed: 42
repeat: 1
